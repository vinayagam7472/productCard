<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .cards {
            width: 150px;
            height: 150px;
            object-fit: contain;
        }

        .title {
            font-size: 14px;
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            padding: 6px 12px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }

        .count {
            margin-left: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="container"></div>

    <script>

        async function item() {
            let get = await fetch('https://api.escuelajs.co/api/v1/products')
            let result = await get.json()
            return result
        }

        item().then((data) => {

            console.log(data)

            data.forEach(item => {

                let card = document.createElement("div")
                card.className = "card"

                let image = document.createElement("img")
                let createtitle = document.createElement("p")
                let createprice = document.createElement("p")
                let button = document.createElement("button")
                let count = document.createElement("span")
                let pre = document.createElement("button")
                let next = document.createElement("button")

                let quantity = 0

                let images = item.images
                let index = 0

                image.src = images[index]
                image.className = "cards"

                createtitle.innerText = item.title
                createtitle.className = "title"

                createprice.innerText = "$" + item.price
                createprice.className = "price"

                pre.innerText = "◀"
                next.innerText = "▶"
                button.innerText = "Add Cart"

                count.innerText = quantity
                count.className = "count"

                button.onclick = function () {
                    quantity++
                    count.innerText = quantity
                }

                pre.onclick = function () {
                    index--
                    if (index < 0) {
                        index = images.length - 1
                    }
                    image.src = images[index]
                }

                next.onclick = function () {
                    index++
                    if (index >= images.length) {
                        index = 0
                    }
                    image.src = images[index]
                }

                card.appendChild(pre)
                card.appendChild(image)
                card.appendChild(next)
                card.appendChild(createtitle)
                card.appendChild(createprice)
                card.appendChild(button)
                card.appendChild(count)

                document.getElementById("container").appendChild(card)

            })

        })
    </script>

</body>

</html>
