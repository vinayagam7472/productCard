<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(to right, #f5f7fa, #e4ecf7);
            margin: 0;
        }

        /* grid layout */

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        /* product card */

        .card {
            background: white;
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        /* product image */

        .cards {
            width: 170px;
            height: 170px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        /* title */

        .title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin: 10px 0;
            height: 40px;
            overflow: hidden;
        }

        /* price */

        .price {
            color: #2e7d32;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* buttons */

        button {
            padding: 7px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.25s ease;
        }

        /* slider buttons */

        .card button:nth-child(1),
        .card button:nth-child(3) {
            background: #eeeeee;
            color: #333;
            margin: 5px;
        }

        .card button:nth-child(1):hover,
        .card button:nth-child(3):hover {
            background: #dcdcdc;
        }

        /* add cart button */

        .card button:nth-child(6) {
            background: #1976d2;
            color: white;
        }

        .card button:nth-child(6):hover {
            background: #0d47a1;
        }

        /* cart count */

        .count {
            margin-left: 8px;
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div id="container"></div>

    <script>

        async function item() {
            let response = await fetch('https://api.escuelajs.co/api/v1/products')
            let data = await response.json()
            return data
        }

        item().then((products) => {

            products.forEach(product => {

                let card = document.createElement("div")
                card.className = "card"

                let image = document.createElement("img")
                let title = document.createElement("p")
                let price = document.createElement("p")
                let button = document.createElement("button")
                let count = document.createElement("span")
                let pre = document.createElement("button")
                let next = document.createElement("button")

                let quantity = 0

                // images array
                let images = product.images || []
                let index = 0

                // show first image safely
                image.src = images.length > 0 ? images[index] : ""
                image.className = "cards"

                title.innerText = product.title
                title.className = "title"

                price.innerText = "$" + product.price
                price.className = "price"

                pre.innerText = "◀"
                next.innerText = "▶"
                button.innerText = "Add Cart"

                count.innerText = quantity
                count.className = "count"

                // add cart counter
                button.onclick = function () {
                    quantity++
                    count.innerText = quantity
                }

                // previous image
                pre.onclick = function () {
                    if (images.length === 0) return

                    index--
                    if (index < 0) {
                        index = images.length - 1
                    }
                    image.src = images[index]
                }

                // next image
                next.onclick = function () {
                    if (images.length === 0) return

                    index++
                    if (index >= images.length) {
                        index = 0
                    }
                    image.src = images[index]
                }
                productCard
                card.appendChild(pre)
                card.appendChild(image)
                card.appendChild(next)
                card.appendChild(title)
                card.appendChild(price)
                card.appendChild(button)
                card.appendChild(count)

                document.getElementById("container").appendChild(card)

            })

        })
    </script>

</body>

</html>
