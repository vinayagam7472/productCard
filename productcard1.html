<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>

bobodbody{
    font-family: Arial, sans-serif;
    background:#f1f3f6;
    margin:0;
}

/* header */

.header{
    background:#2874f0;
    color:white;
    padding:14px;
    font-size:20px;
    font-weight:bold;
    text-align:center;
}

/* product grid */

#container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:25px;
    padding:25px;
}

/* product card */

.card{
    background:white;
    border-radius:8px;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 8px 18px rgba(0,0,0,0.18);
}

/* product image */

.cards{
    width:100%;
    height:190px;
    object-fit:contain;
    margin-bottom:8px;
}

/* slider buttons */

.card button:nth-child(2),
.card button:nth-child(3){
    background:#eeeeee;
    border:none;
    padding:5px 10px;
    margin:5px;
    border-radius:4px;
    cursor:pointer;
}

.card button:nth-child(2):hover,
.card button:nth-child(3):hover{
    background:#d6d6d6;
}

/* product title */

.title{
    font-size:14px;
    color:#212121;
    margin:10px 0;
    height:38px;
    overflow:hidden;
}

/* price */

.price{
    color:#388e3c;
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

/* add cart button */

.card button:nth-child(6){
    background:#ff9f00;
    color:white;
    border:none;
    padding:7px 14px;
    border-radius:5px;
    cursor:pointer;
}

.card button:nth-child(6):hover{
    background:#fb8c00;
}

/* cart count */

.count{
    margin-left:8px;
    font-weight:bold;
    color:#333;
    font-size:15px;
}
</style>
</head>

<body>

<div class="header">🛒 My Shop</div>

<div id="container"></div>

<script>

async function item() {
    let response = await fetch('https://api.escuelajs.co/api/v1/products')
    let data = await response.json()
    return data
}

item().then((products) => {

    products.forEach(product => {

        let card = document.createElement("div")
        card.className = "card"

        let image = document.createElement("img")
        let title = document.createElement("p")
        let price = document.createElement("p")
        let button = document.createElement("button")
        let count = document.createElement("span")
        let pre = document.createElement("button")
        let next = document.createElement("button")

        let quantity = 0

        let images = product.images || []
        let index = 0

        image.src = images.length > 0 ? images[index] : ""
        image.className = "cards"

        title.innerText = product.title
        title.className = "title"

        price.innerText = "$" + product.price
        price.className = "price"

        pre.innerText = "◀"
        next.innerText = "▶"
        button.innerText = "Add Cart"

        count.innerText = quantity
        count.className = "count"

        button.onclick = function () {
            quantity++
            count.innerText = quantity
        }

        pre.onclick = function () {
            if (images.length === 0) return
            index--
            if (index < 0) {
                index = images.length - 1
            }
            image.src = images[index]
        }

        next.onclick = function () {
            if (images.length === 0) return
            index++
            if (index >= images.length) {
                index = 0
            }
            image.src = images[index]
        }

        
        card.appendChild(image)
        card.appendChild(pre)
        card.appendChild(next)
        card.appendChild(title)
        card.appendChild(price)
        card.appendChild(button)
        card.appendChild(count)

        document.getElementById("container").appendChild(card)

    })

})

</script>

</body>

</html>
